<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Paw Icon Options</title>
  <style>
    body { background: #090a0f; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px; }
    h1 { color: #00e5ff; margin-bottom: 40px; }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 40px; }
    .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(0,229,255,0.3); border-radius: 16px; padding: 30px; text-align: center; cursor: pointer; transition: 0.3s; }
    .card:hover { background: rgba(0,229,255,0.1); border-color: #00e5ff; transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,229,255,0.2); }
    svg { width: 80px; height: 80px; color: #00e5ff; margin-bottom: 20px; }
    h2 { font-size: 1.2rem; margin: 0; }
  </style>
</head>
<body>
  <h1>Select a Paw Icon Style</h1>
  <div class="grid">
    
    <!-- Option 1: Classic (Material) -->
    <div class="card" onclick="alert('You chose Option 1')">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M8.35 3C7.1 3 6 4.1 6 5.35c0 1.3 1.1 2.35 2.35 2.35s2.35-1.05 2.35-2.35C10.7 4.1 9.6 3 8.35 3zm7.3 0C14.4 3 13.3 4.1 13.3 5.35c0 1.3 1.1 2.35 2.35 2.35S18 6.65 18 5.35C18 4.1 16.9 3 15.65 3zM4.5 7.5C3.12 7.5 2 8.62 2 10s1.12 2.5 2.5 2.5S7 11.38 7 10 5.88 7.5 4.5 7.5zm15 0c-1.38 0-2.5 1.12-2.5 2.5s1.12 2.5 2.5 2.5S22 11.38 22 10s-1.12-2.5-2.5-2.5zm-7.5 1c-2.97 0-6 2.03-6 5.5 0 2.5 2.5 6 6 6s6-3.5 6-6c0-3.47-3.03-5.5-6-5.5z" />
      </svg>
      <h2>Option 1: Classic (Material)</h2>
    </div>

    <!-- Option 2: Perfect Circles (Current) -->
    <div class="card" onclick="alert('You chose Option 2')">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <circle cx="4.5" cy="10" r="2.5" />
        <circle cx="9.5" cy="5.5" r="2.5" />
        <circle cx="14.5" cy="5.5" r="2.5" />
        <circle cx="19.5" cy="10" r="2.5" />
        <path d="M 6 14.5 A 6 6 0 0 1 18 14.5 C 18 18.5 14 21 12 22 C 10 21 6 18.5 6 14.5 Z" />
      </svg>
      <h2>Option 2: Perfect Circles (Current)</h2>
    </div>

    <!-- Option 3: Cyber Geometric -->
    <div class="card" onclick="alert('You chose Option 3')">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <polygon points="2,12 5,8 8,12 5,14" />
        <polygon points="7.5,7 10.5,3 13.5,7 10.5,9" />
        <polygon points="13.5,7 16.5,3 19.5,7 16.5,9" />
        <polygon points="19,12 22,8 25,12 22,14" transform="translate(-3,0)" />
        <polygon points="6,15 12,11 18,15 15,22 9,22" />
      </svg>
      <h2>Option 3: Cyber Geometric</h2>
    </div>

    <!-- Option 4: Cute & Chubby -->
    <div class="card" onclick="alert('You chose Option 4')">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <circle cx="5" cy="12" r="3.5" />
        <circle cx="9.5" cy="6" r="3.5" />
        <circle cx="14.5" cy="6" r="3.5" />
        <circle cx="19" cy="12" r="3.5" />
        <path d="M 4 16 C 4 12, 20 12, 20 16 C 20 23, 15 23, 12 23 C 9 23, 4 23, 4 16 Z" />
      </svg>
      <h2>Option 4: Cute & Chubby</h2>
    </div>

  </div>
</body>
</html>
