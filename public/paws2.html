<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Paw Icon Options - Libraries</title>
  
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" />
  <!-- Remix Icon -->
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <!-- Line Awesome -->
  <link rel="stylesheet" href="https://maxst.icons8.com/vue-static/landings/line-awesome/line-awesome/1.3.0/css/line-awesome.min.css">
  
  <style>
    body { background: #090a0f; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px; }
    h1 { color: #00e5ff; margin-bottom: 30px; text-align: center; }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 30px; max-width: 800px; width: 100%; }
    .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(0,229,255,0.3); border-radius: 16px; padding: 40px; text-align: center; cursor: pointer; transition: 0.3s; }
    .card:hover { background: rgba(0,229,255,0.1); border-color: #00e5ff; transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,229,255,0.2); }
    i { font-size: 60px; color: #00e5ff; margin-bottom: 20px; display: block; }
    h2 { font-size: 1.1rem; margin: 0; }
  </style>
</head>
<body>
  <h1>Select an Official Library Icon</h1>
  <p style="margin-bottom: 40px; color: #94a3b8;">If you prefer standard professional icons, please select from below:</p>
  
  <div class="grid">
    <!-- Option 1: FontAwesome Solid -->
    <div class="card" onclick="alert('You chose FontAwesome Solid')">
      <i class="fa-solid fa-paw"></i>
      <h2>Option 1: FontAwesome (Solid)</h2>
    </div>

    <!-- Option 2: Remix Icon -->
    <div class="card" onclick="alert('You chose Remix Icon')">
      <i class="ri-bear-smile-fill"></i>
      <h2>Option 2: Remix Icon (Bear/Paw variant)</h2>
    </div>

    <!-- Option 3: Line Awesome (Paw) -->
    <div class="card" onclick="alert('You chose Line Awesome')">
      <i class="las la-paw"></i>
      <h2>Option 3: Line Awesome (Paw)</h2>
    </div>

    <!-- Option 4: Phosphor / Custom Shape (via SVG here) -->
    <div class="card" onclick="alert('You chose Phosphor Icon')">
      <svg viewBox="0 0 256 256" fill="#00e5ff" style="width:60px; height:60px; margin-bottom: 20px;">
        <path d="M84,60a28,28,0,1,1,28-28A28,28,0,0,1,84,60ZM200,60a28,28,0,1,0-28-28A28,28,0,0,0,200,60Zm-72,28a36,36,0,1,0-36-36A36,36,0,0,0,128,88ZM222.84,136.19a48.16,48.16,0,0,0-58-29.35l-7.72,2.3a55.93,55.93,0,0,1-58.26,0l-7.72-2.3a48,48,0,0,0-58,29.35C24.3,165.73,38,201.27,62,217.47c17.65,11.88,40.16,14.54,66,14.53,25.86,0,48.37-2.65,66-14.53C218,201.27,231.7,165.73,222.84,136.19Z"></path>
      </svg>
      <h2>Option 4: Phosphor Icons (Solid Paw)</h2>
    </div>
  </div>
</body>
</html>
